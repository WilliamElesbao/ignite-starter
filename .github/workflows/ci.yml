name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3


      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install

      - name: Validate i18n keys
        run: |
          cd apps/web
          bun run locale-check
          bun run locale-unused

      - name: Typecheck
        run: bun run tsc

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Test Coverage
        run: bun run test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            apps/web/coverage/
            packages/backend-base/coverage/
            packages/ui/coverage/
          retention-days: 7
        
  sonarcloud:
    name: SonarCloud
    needs: [validate]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: ./

      - name: Verify coverage reports
        run: |
          echo "Checking for coverage reports..."
          find . -name "lcov.info" -type f
          
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    name: Build
    needs: sonarcloud
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3


      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

