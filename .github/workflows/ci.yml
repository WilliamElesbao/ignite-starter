name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:

# Cancel superseded runs on the same ref (e.g. new pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  validate:
    name: Playwright Tests, Lint, i18n Audit, Typecheck, and Test Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install

      - name: Lint
        run: bun run ci

      - name: i18n Audit
        run: |
          cd apps/web
          bun run locale-check
          bun run locale-unused

      - name: Generate API client from backend OpenAPI schema
        env:
          DATABASE_URL: postgresql://postgres_user:postgres_password@localhost:5432/ignite-starter
          REDIS_URL: redis://:abcd1234@localhost:6379
          WEB_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: ci.apps.googleusercontent.com
          GOOGLE_CLIENT_SECRET: ci-secret
          STRIPE_API_KEY: sk_test_ci_fakekey
          STRIPE_WEBHOOK_SECRET: whsec_ci_fakesecret
          API_URL: http://localhost:3333
          PORT: 3333
        run: |
          bun run apps/backend/src/index.ts &
          BACKEND_PID=$!

          for i in $(seq 1 30); do
            if curl -s http://localhost:3333/openapi/json > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... (attempt $i)"
            sleep 2
          done

          bun run --cwd packages/api generate

          kill $BACKEND_PID 2>/dev/null || true
          wait $BACKEND_PID 2>/dev/null || true

      - name: Typecheck
        run: bun run tsc

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            apps/web/coverage/
            packages/backend-base/coverage/
            packages/ui/coverage/
          retention-days: 7

  sonarcloud:
    name: SonarCloud
    needs: [validate]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: ./

      - name: Verify coverage reports
        run: |
          echo "Checking for coverage reports..."
          find . -name "lcov.info" -type f

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    name: Build
    needs: [validate, sonarcloud]
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ secrets.API_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
