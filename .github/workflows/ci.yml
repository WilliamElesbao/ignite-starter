name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

  i18n-audit:
    name: i18n Audit
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate i18n keys
        run: |
          cd apps/web
          bun run locale-check
          bun run locale-unused

  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: |
          (cd apps/web && bun tsc --noEmit)
          (cd apps/backend && bun tsc --noEmit)
          (cd packages/backend-base && bun tsc --noEmit)
          (cd packages/database && bun tsc --noEmit)
          (cd packages/emails && bun tsc --noEmit)
          (cd packages/api && bun tsc --noEmit)
          (cd packages/ui && bun tsc --noEmit)

  lint:
    name: Lint
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun biome ci .

  test-backend:
    name: Test Backend
    needs: [install, typecheck, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run backend tests
        run: |
          cd packages/backend-base
          bun run test

  test-web:
    name: Test Web
    needs: [install, typecheck, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run web tests
        run: |
          cd apps/web
          bun run test

  sonarcloud:
    name: SonarCloud
    needs: [typecheck, lint, test-backend, test-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for accurate analysis

    #   - name: Download coverage report
    #     uses: actions/download-artifact@v4
    #     with:
    #       name: coverage
    #       path: coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-database:
    name: Build Database
    needs: [install, typecheck, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build database package
        run: |
          cd packages/database
          bun run build

  build-backend:
    name: Build Backend
    needs: build-database
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build backend
        run: |
          cd apps/backend
          bun run build

  build-web:
    name: Build Web
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web
        run: |
          cd apps/web
          bun run build