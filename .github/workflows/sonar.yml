name: SonarCloud Analysis

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ['**']
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    environment: Development

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full git history required for SonarCloud analysis

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate SonarCloud token
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "::error title=Missing SONAR_TOKEN::Configure SONAR_TOKEN in GitHub repository secrets before running SonarCloud analysis."
            exit 1
          fi

      # - name: Run tests with coverage (web)
      #   run: cd apps/web && bun run test -- --coverage
      #   continue-on-error: true # Don't block analysis if tests fail

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
