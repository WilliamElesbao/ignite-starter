services:
  redis:
    container_name: ignite-starter-redis
    image: redis:8.6-alpine
    restart: always
    ports:
      - "6379:6379"
    env_file:
      - ./apps/backend/.env
    command: redis-server --requirepass abcd1234
    # volumes:
    #   - ./.docker/redis:/data

  redis-insight:
    image: redis/redisinsight:latest
    container_name: ignite-starter-redis-insight
    restart: unless-stopped
    ports:
      - "8888:5540"
    depends_on:
      - redis

  database:
    image: postgres:latest
    container_name: ignite-starter-database
    environment:
      POSTGRES_DB: ignite-starter
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "5432:5432"
    # volumes:
    #   - ./.docker/postgres:/var/lib/postgresql/data

  stripe:
    image: stripe/stripe-cli:latest
    container_name: ignite-starter-stripe-webhook
    command: listen --forward-to http://host.docker.internal:3333/auth/stripe/webhook
    env_file:
      - ./apps/backend/.env
    depends_on:
      - database

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: ignite-starter-jaeger
    ports:
      - "16686:16686" # Jaeger UI
      - "4318:4318" # OTLP HTTP receiver (traces)
    environment:
      - COLLECTOR_OTLP_ENABLED=true
