sonar.projectKey=ignite-starter_ignite-starter
sonar.organization=ignite-starter

# Sources
sonar.sources=\
  apps/web/src,\
  apps/backend/src,\
  packages/backend-base/src,\
  packages/database/src,\
  packages/emails/src,\
  packages/ui/src

# Tests
sonar.tests=\
  apps/web/src,\
  packages/backend-base/src,\
  packages/ui/src

sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/generated/**,\
  **/.next/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/*.gen.ts,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/.storybook/**,\
  **/storybook-static/**

# Coverage paths
sonar.javascript.lcov.reportPaths=\
  apps/web/coverage/lcov.info,\
  packages/backend-base/coverage/lcov.info,\
  packages/ui/coverage/lcov.info
